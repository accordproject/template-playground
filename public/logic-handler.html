<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logic Sandbox</title>
</head>
<body>
<script>
  /**
   * Logic Sandbox Handler
   *
   * This page runs inside a sandboxed iframe with "allow-scripts" only
   * (no "allow-same-origin"). The browser assigns it a null origin,
   * isolating it from the parent application's DOM, storage, and memory.
   *
   * Execution pipeline:
   *   1. Parent sends compiled JS code (Data URL) + payload via postMessage
   *   2. This handler spawns a Blob-based Web Worker (ES Module)
   *   3. A timeout kill-switch terminates runaway executions
   *   4. Results (or errors) are relayed back to the parent via postMessage
   */

  'use strict';

  var EXECUTION_TIMEOUT_MS = 5000;

  function isValidExecutionMessage(data) {
    return (
      data !== null &&
      typeof data === 'object' &&
      data.type === 'execute' &&
      typeof data.code === 'string' &&
      typeof data.executionId === 'number' &&
      typeof data.method === 'string' &&
      Array.isArray(data.args)
    );
  }

  window.addEventListener('message', function handleMessage(event) {
    var msg = event.data;
    if (!isValidExecutionMessage(msg)) return;

    var executionId = msg.executionId;
    var blobURL = null;
    var worker = null;
    var timeoutHandle = null;
    var settled = false;

    function cleanup() {
      if (timeoutHandle) {
        clearTimeout(timeoutHandle);
        timeoutHandle = null;
      }
      if (worker) {
        worker.terminate();
        worker = null;
      }
      if (blobURL) {
        URL.revokeObjectURL(blobURL);
        blobURL = null;
      }
    }

    function settle(response) {
      if (settled) return;
      settled = true;
      response.executionId = executionId;
      window.parent.postMessage(response, '*');
      cleanup();
    }

    try {
      var workerScript = [
        'self.onmessage = async function(e) {',
        '  try {',
        '    const LogicClass = (new Function(e.data.code))();',
        '    const instance = typeof LogicClass === "function" ? new LogicClass() : LogicClass;',
        '    const method = e.data.method;',
        '    const args = e.data.args;',
        '    if (typeof instance[method] !== "function") {',
        '      throw new Error(`Method ${method} not found on Logic instance`);',
        '    }',
        '    const result = await Promise.resolve(instance[method].apply(instance, args));',
        '    self.postMessage({',
        '      success: true,',
        '      result: JSON.parse(JSON.stringify(result !== undefined ? result : null))',
        '    });',
        '  } catch (err) {',
        '    self.postMessage({',
        '      success: false,',
        '      error: err instanceof Error ? err.message : String(err)',
        '    });',
        '  }',
        '};'
      ].join('\n');

      blobURL = URL.createObjectURL(
        new Blob([workerScript], { type: 'application/javascript' })
      );
      
      worker = new Worker(blobURL);

      worker.onmessage = function(workerEvent) {
        settle({
          type: 'execution-result',
          success: workerEvent.data.success,
          result: workerEvent.data.result,
          error: workerEvent.data.error
        });
      };

      worker.onerror = function(errorEvent) {
        errorEvent.preventDefault();
        settle({
          type: 'execution-result',
          success: false,
          error: errorEvent.message || 'Worker encountered an unexpected error'
        });
      };

      timeoutHandle = setTimeout(function() {
        settle({
          type: 'execution-result',
          success: false,
          error: 'Execution timed out after ' + EXECUTION_TIMEOUT_MS + 'ms'
        });
      }, EXECUTION_TIMEOUT_MS);

      worker.postMessage({
        code: msg.code, // Expects data:text/javascript;base64,...
        method: msg.method,
        args: msg.args
      });

    } catch (err) {
      settle({
        type: 'execution-result',
        success: false,
        error: err instanceof Error ? err.message : String(err)
      });
    }
  });

  // Signal readiness to the parent application
  window.parent.postMessage({ type: 'sandbox-ready' }, '*');
</script>
</body>
</html>
